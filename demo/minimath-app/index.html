<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniMathApp — Area of Rectangles</title>
    <!--
      MiniMathApp: a fictional math-practice app screen built ONLY to produce
      screenshots / live-demo context for the PELE 2026 talk. It is not part of
      the AI Experiment Consultant product and has no UpGrade integration.
      This is the *current* problem screen — no experimental variant. See README.md.
    -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" role="main" aria-label="MiniMathApp practice screen">
      <!-- Top app bar -->
      <header class="topbar">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" width="28" height="28">
              <rect x="2" y="2" width="28" height="28" rx="9" fill="url(#g)" />
              <path
                d="M9 21V11l4 5 3-4 3 5 4-6"
                fill="none"
                stroke="#fff"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#0ea5a4" />
                  <stop offset="1" stop-color="#22c55e" />
                </linearGradient>
              </defs>
            </svg>
          </span>
          <span class="brand__name">MiniMathApp</span>
        </div>

        <div class="topbar__right">
          <span class="chip chip--streak" title="Daily streak">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path
                d="M12 2c1.6 3 .4 4.7-1 6.5C9.4 10.5 8 12.2 8 14.5A4 4 0 0 0 16 15c0-1.3-.5-2.3-1-3 .2 1.2 1.5 1.7 1.5 3a1.5 1.5 0 0 1-3 .2c2-2.4-1.5-3.2-1.5-6.2 2.5 1 4.5 3 4.5 6.3A6 6 0 0 1 6 15c0-3.2 2.2-5 3.6-6.9C11 6 12 4.6 12 2Z"
                fill="#f97316"
              />
            </svg>
            <span class="chip__label"><strong>5</strong>&nbsp;day streak</span>
          </span>
          <span class="avatar" title="Alex L." aria-label="Student: Alex L.">AL</span>
        </div>
      </header>

      <!-- Lesson context + progress -->
      <section class="lesson" aria-label="Lesson progress">
        <div class="lesson__heading">
          <span class="lesson__unit">Unit 6 · Area &amp; Perimeter</span>
          <h1 class="lesson__title">Area of Rectangles</h1>
        </div>
        <div class="lesson__progress">
          <span class="lesson__count">Problem <strong>3</strong> of 8</span>
          <div
            class="progressbar"
            role="progressbar"
            aria-valuenow="3"
            aria-valuemin="0"
            aria-valuemax="8"
            aria-label="3 of 8 problems complete"
          >
            <span class="progressbar__fill" style="width: 37.5%"></span>
          </div>
        </div>
      </section>

      <!-- Problem card -->
      <section class="card" aria-label="Word problem">
        <span class="card__kicker">Word Problem</span>

        <p class="problem">
          Maria is planting a rectangular vegetable garden. The garden is
          <strong>8 meters</strong> long and <strong>5 meters</strong> wide.
          What is the <strong>area</strong> of Maria's garden?
        </p>

        <!-- Simple garden / rectangle diagram -->
        <figure class="diagram" aria-label="Diagram of a rectangular garden, 8 meters long and 5 meters wide">
          <svg viewBox="0 0 360 220" width="100%" height="auto" role="img">
            <title>Rectangular garden: 8 meters long by 5 meters wide</title>
            <!-- plot -->
            <rect x="70" y="40" width="220" height="120" rx="8"
                  fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" />
            <!-- soil rows -->
            <g stroke="#86efac" stroke-width="2">
              <line x1="70" y1="70" x2="290" y2="70" />
              <line x1="70" y1="100" x2="290" y2="100" />
              <line x1="70" y1="130" x2="290" y2="130" />
            </g>
            <!-- little sprouts -->
            <g fill="#22c55e">
              <circle cx="110" cy="70" r="3.5" />
              <circle cx="180" cy="70" r="3.5" />
              <circle cx="250" cy="70" r="3.5" />
              <circle cx="110" cy="100" r="3.5" />
              <circle cx="180" cy="100" r="3.5" />
              <circle cx="250" cy="100" r="3.5" />
              <circle cx="110" cy="130" r="3.5" />
              <circle cx="180" cy="130" r="3.5" />
              <circle cx="250" cy="130" r="3.5" />
            </g>
            <!-- width label (bottom): 8 m -->
            <g stroke="#475569" stroke-width="1.5" fill="none">
              <line x1="70" y1="180" x2="290" y2="180" />
              <line x1="70" y1="174" x2="70" y2="186" />
              <line x1="290" y1="174" x2="290" y2="186" />
            </g>
            <text x="180" y="200" text-anchor="middle" class="dim">8 m</text>
            <!-- height label (left): 5 m -->
            <g stroke="#475569" stroke-width="1.5" fill="none">
              <line x1="40" y1="40" x2="40" y2="160" />
              <line x1="34" y1="40" x2="46" y2="40" />
              <line x1="34" y1="160" x2="46" y2="160" />
            </g>
            <text x="22" y="104" text-anchor="middle" class="dim"
                  transform="rotate(-90 22 104)">5 m</text>
          </svg>
        </figure>

        <!-- Answer area -->
        <form class="answer" id="answer-form" novalidate>
          <label class="answer__label" for="answer-input">Your answer</label>
          <div class="answer__row">
            <div class="answer__field">
              <input
                id="answer-input"
                name="answer"
                type="number"
                inputmode="numeric"
                placeholder="Type a number"
                autocomplete="off"
                aria-describedby="answer-feedback"
              />
              <span class="answer__unit" aria-hidden="true">m²</span>
            </div>
            <button class="btn" type="submit" id="submit-btn">Check answer</button>
          </div>
          <p class="answer__feedback" id="answer-feedback" role="status" aria-live="polite"></p>
        </form>

        <footer class="card__footer">
          <span class="attempts" id="attempts">Attempt 1</span>
          <button class="link" type="button" id="skip-btn">Skip for now</button>
        </footer>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
